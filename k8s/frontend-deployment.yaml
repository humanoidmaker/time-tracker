apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: time-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: time-tracker-frontend:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: time-tracker
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
